<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!--
  PATH B — hand-drawn article figure with CRISP text (dependency-free).
  Use when labels must be exact (names, numbers, code) and gpt-image would garble them.
  Hand-drawn wobble comes from an SVG turbulence filter (no CDN) so it renders offline/reliably.
  Same locked palette as Path A: light-grey field, black marker, ONE blue accent, NO yellow.

  HOW TO USE
  1. Edit the CONFIG block (title, boxes, arrows). Text renders crisp — exact labels are fine.
  2. Render:  npx playwright screenshot --viewport-size="1024,683" html-figure-template.html out.png
  3. Run the skill's "bar" on the PNG, then save into the article's images/ folder.
  Other layouts (comparison / stack / cycle): reuse box()/arrow() with your own coordinates.
-->
<title>Article figure — Path B</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{ --field:#e9ebee; --ink:#14161a; --blue:#2a5bd0; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ width:1024px; height:683px; background:var(--field); overflow:hidden; }
  svg{ display:block; }
  .label{ font-family:"Caveat",cursive; font-weight:700; font-size:36px; fill:var(--ink); }
  .title{ font-family:"Caveat",cursive; font-weight:700; font-size:48px; fill:var(--ink); }
  .cap{ font-family:"IBM Plex Mono",monospace; font-size:13px; fill:#3b414b; }
</style>
</head>
<body>
<svg id="c" width="1024" height="683" viewBox="0 0 1024 683" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- the hand-drawn wobble: displace crisp edges with fractal noise (shapes only, not text) -->
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>
<script>
/* ───────────── CONFIG — edit this ───────────── */
const TITLE  = "Pixels become a practice";
const BOXES  = [
  { x:60,  y:300, w:230, h:150, label:"INPUT",   cap:"raw context" },
  { x:397, y:300, w:230, h:150, label:"PROCESS", cap:"the system",  highlight:true },
  { x:734, y:300, w:230, h:150, label:"OUTPUT",  cap:"a practice" },
];
const ARROWS = [ [290,375,397,375], [627,375,734,375] ];
/* ─────────────────────────────────────────────── */

const NS="http://www.w3.org/2000/svg", INK="#14161a", BLUE="#2a5bd0";
const svg=document.getElementById("c");
const G=document.createElementNS(NS,"g"); G.setAttribute("filter","url(#rough)"); svg.appendChild(G); // wobbled shapes
const T=document.createElementNS(NS,"g"); svg.appendChild(T);                                          // crisp text

const el=(p,a,parent)=>{const n=document.createElementNS(NS,p);for(const k in a)n.setAttribute(k,a[k]);parent.appendChild(n);return n;};
const txt=(x,y,s,cls)=>{const n=el("text",{x,y,"text-anchor":"middle",class:cls},T);n.textContent=s;};

function box(b){
  if(b.highlight) el("rect",{x:b.x+26,y:b.y+34,width:b.w-52,height:42,rx:6,fill:BLUE,opacity:.85},G); // blue highlighter
  el("rect",{x:b.x,y:b.y,width:b.w,height:b.h,rx:16,fill:"none",stroke:INK,"stroke-width":2.6},G);
  txt(b.x+b.w/2,b.y+64,b.label,"label");
  if(b.cap) txt(b.x+b.w/2,b.y+104,b.cap,"cap");
}
function arrow(x1,y1,x2,y2){
  el("line",{x1,y1,x2,y2,stroke:INK,"stroke-width":2.6},G);
  const a=Math.atan2(y2-y1,x2-x1),L=14;
  el("line",{x1:x2,y1:y2,x2:x2-L*Math.cos(a-.4),y2:y2-L*Math.sin(a-.4),stroke:INK,"stroke-width":2.6},G);
  el("line",{x1:x2,y1:y2,x2:x2-L*Math.cos(a+.4),y2:y2-L*Math.sin(a+.4),stroke:INK,"stroke-width":2.6},G);
}

el("line",{x1:300,y1:150,x2:724,y2:150,stroke:BLUE,"stroke-width":4},G); // title underline (wobbled)
txt(512,138,TITLE,"title");
ARROWS.forEach(a=>arrow(...a));
BOXES.forEach(box);
document.title="rendered";
</script>
</body>
</html>
